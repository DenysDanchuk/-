<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Кошик</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>🛒 Кошик</h1>

<div class="cart">
    {% for p in cart %}
        <div class="cart-item">
            <p>{{ p.name }}</p>
            <p>{{ p.price }} грн</p>
        </div>
    {% endfor %}
</div>

<h2>Сума: {{ total }} грн</h2>

<a href="/">← Назад</a>

</body>
</html>
